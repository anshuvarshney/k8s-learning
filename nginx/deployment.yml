apiVersion: apps/v1
kind: Deployment
metadata:
  name: Deployment
  namespace: dev
spec: 
  replicas: 2
  selector:
    matchLables:
      app: nginx

  template:
    metadata:
    labels:
      app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80